name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    # The test suite exercises live S3 (health, object GET, 404). Dependabot
    # PRs don't receive repo secrets, so skip AWS-dependent jobs for them.
    if: github.actor != 'dependabot[bot]'
    env:
      BUCKET: s3proxy-public
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run test

  docker:
    name: Docker Build & Smoke
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          load: true
          tags: s3proxy-docker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test the container
        run: |
          docker run -d --name s3proxy -p 8080:8080 \
            -e BUCKET=s3proxy-public \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN \
            -e AWS_REGION s3proxy-docker:ci
          # Wait for the healthcheck to report healthy (max ~30s).
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' s3proxy 2>/dev/null || echo starting)
            echo "health: $status"
            [ "$status" = "healthy" ] && break
            sleep 2
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' s3proxy)" = "healthy" ]
          echo "--- GET /index.html ---"
          curl -fsS -o /dev/null -w "status=%{http_code} type=%{content_type}\n" http://localhost:8080/index.html
          echo "--- GET missing key (expect 404) ---"
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/does-not-exist)
          [ "$code" = "404" ] || { echo "expected 404, got $code"; exit 1; }
      - name: Container logs
        if: always()
        run: docker logs s3proxy || true
