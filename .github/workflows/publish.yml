name: Publish

# Publishes forkzero/s3proxy to Docker Hub. Triggered three ways, all of which
# resolve the image tags from the release tag (e.g. v4.2.0 -> 4.2.0, 4.2, latest):
#  - workflow_call: release-please invokes this when it cuts a release.
#  - release: a manually published GitHub Release.
#  - workflow_dispatch: manual re-publish of a given tag.
on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: Release tag to publish (e.g. v4.2.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v4.2.0)
        required: true
        type: string

env:
  IMAGE: forkzero/s3proxy

jobs:
  publish:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: tag
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          test -n "$TAG" || { echo "no release tag supplied"; exit 1; }
          VER="${TAG#v}"
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "minor=${VER%.*}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Tags derived from the resolved version (semver-from-git-ref doesn't
          # apply here: on a workflow_call the ref is main, not the tag).
          tags: |
            type=raw,value=${{ steps.tag.outputs.version }}
            type=raw,value=${{ steps.tag.outputs.minor }}
            type=raw,value=latest

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain attestations attached to the pushed image: an SPDX
          # SBOM and max-level SLSA provenance. Docker Hub surfaces both.
          sbom: true
          provenance: mode=max

  scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: [publish]
    # Advisory only: the image is already published by the time this runs, so a
    # scan/tooling hiccup must never mark the release failed.
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Scan published image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0' # report only; don't fail the pipeline
      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
